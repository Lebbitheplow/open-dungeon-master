<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- App favicon: a gold d20 on the arcane-night background. -->
  <rect width="64" height="64" rx="14" fill="#181420"/>
  <g stroke="#e5b84b" stroke-width="3" stroke-linejoin="round" fill="none">
    <!-- icosahedron silhouette (point-top hexagon) -->
    <path d="M32 7 L53 19.5 L53 44.5 L32 57 L11 44.5 L11 19.5 Z" fill="#241d33"/>
    <!-- central face -->
    <path d="M14.5 22 L49.5 22 L32 52.5 Z" fill="#181420"/>
    <!-- edges from silhouette to the central face -->
    <path d="M32 7 L14.5 22 M32 7 L49.5 22 M11 44.5 L32 52.5 M53 44.5 L32 52.5"/>
  </g>
  <text x="32" y="36.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="15" fill="#f4e0a6">20</text>
</svg>
